services:
  postgres:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_USER: daily
      POSTGRES_PASSWORD: daily_dev
      POSTGRES_DB: daily
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  pgdata:
